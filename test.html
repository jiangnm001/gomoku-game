<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋功能测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; background: #f5f5f5; border-radius: 5px; }
        .test-result { margin: 10px 0; }
        .pass { color: green; }
        .fail { color: red; }
        button { margin: 5px; padding: 8px 15px; }
    </style>
</head>
<body>
    <h1>五子棋功能测试</h1>

    <div class="test-section">
        <h2>悔棋功能测试</h2>
        <button onclick="testUndo()">测试多步悔棋</button>
        <div id="undo-result" class="test-result"></div>
    </div>

    <div class="test-section">
        <h2>获胜检测测试</h2>
        <button onclick="testWinDetection()">测试获胜检测</button>
        <div id="win-result" class="test-result"></div>
    </div>

    <div class="test-section">
        <h2>最后落子标记测试</h2>
        <button onclick="testLastMove()">测试最后落子</button>
        <div id="lastmove-result" class="test-result"></div>
    </div>

    <script type="module">
        import { Game } from './js/game.js';

        window.testUndo = function() {
            const game = new Game(15);
            const result = document.getElementById('undo-result');

            // 进行5步棋
            game.makeMove(7, 7); // 黑棋
            game.makeMove(7, 8); // 白棋
            game.makeMove(8, 7); // 黑棋
            game.makeMove(8, 8); // 白棋
            game.makeMove(9, 7); // 黑棋

            // 测试悔棋功能
            let success = true;
            let message = '';

            // 应该可以悔5步
            for (let i = 0; i < 5; i++) {
                if (!game.undo()) {
                    success = false;
                    message = `悔棋失败，只能悔${i}步`;
                    break;
                }
            }

            if (success) {
                message = '✓ 多步悔棋功能正常，可以悔5步棋';
                result.className = 'test-result pass';
            } else {
                result.className = 'test-result fail';
            }

            result.innerHTML = message + `<br>当前可悔棋步数：${game.getUndoCount()}`;
        };

        window.testWinDetection = function() {
            const game = new Game(15);
            const result = document.getElementById('win-result');

            // 创建一个横向五连
            game.makeMove(7, 7); // 黑棋
            game.makeMove(0, 0); // 白棋（随意）
            game.makeMove(7, 8); // 黑棋
            game.makeMove(0, 1); // 白棋
            game.makeMove(7, 9); // 黑棋
            game.makeMove(0, 2); // 白棋
            game.makeMove(7, 10); // 黑棋
            game.makeMove(0, 3); // 白棋
            game.makeMove(7, 11); // 黑棋 - 获胜！

            const winningStones = game.getWinningStones();
            if (winningStones && winningStones.length === 5) {
                result.innerHTML = `<span class='pass'>✓ 获胜检测正常</span><br>`;
                result.innerHTML += `获胜五子坐标：${JSON.stringify(winningStones)}`;
                result.className = 'test-result pass';
            } else {
                result.innerHTML = `<span class='fail'>✗ 获胜检测失败</span>`;
                result.className = 'test-result fail';
            }
        };

        window.testLastMove = function() {
            const game = new Game(15);
            const result = document.getElementById('lastmove-result');

            game.makeMove(7, 7);
            const lastMove1 = game.getLastMove();

            game.makeMove(8, 8);
            const lastMove2 = game.getLastMove();

            if (lastMove1 && lastMove1.row === 7 && lastMove1.col === 7 &&
                lastMove2 && lastMove2.row === 8 && lastMove2.col === 8) {
                result.innerHTML = `<span class='pass'>✓ 最后落子记录正常</span><br>`;
                result.innerHTML += `第一步：(${lastMove1.row}, ${lastMove1.col})<br>`;
                result.innerHTML += `第二步：(${lastMove2.row}, ${lastMove2.col})`;
                result.className = 'test-result pass';
            } else {
                result.innerHTML = `<span class='fail'>✗ 最后落子记录失败</span>`;
                result.className = 'test-result fail';
            }
        };
    </script>
</body>
</html>
