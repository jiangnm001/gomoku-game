<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋游戏 - Gomoku Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

        <h1>五子棋游戏</h1>

        <div id="game-message"></div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
